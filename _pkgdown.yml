reference:
- title: Package
  contents:
  - bayesEfron-package
- title: Fit
  desc: >
    Primary entry point for fitting the fully Bayesian Efron
    log-spline prior to a univariate random-effects deconvolution
    problem.
  contents:
  - bayes_efron_fit
- title: Data preparation
  desc: >
    Convert effect-size inputs (plain list or `metafor::escalc()`
    object) into the canonical `bef_data` class consumed by the
    fit pipeline.
  contents:
  - as_bef_data
- title: Grid construction
  desc: >
    Build the discrete support and natural-cubic-spline basis used
    by the Stan model. Four recipes covering the paper's
    real-data, simulation, sensitivity, and an experimental
    KL-target setting.
  contents:
  - make_efron_grid
- title: Compile and cache
  desc: >
    Pre-warm the Stan model cache and maintain the on-disk and
    in-session cache layers.
  contents:
  - bayes_efron_compile
  - bayes_efron_clear_cache
- title: Diagnostics
  desc: >
    Sampler-health and convergence diagnostics produced by the fit
    pipeline.
  contents:
  - diagnose
- title: Visualization
  desc: >
    Caterpillar, prior-summary, sensitivity, and diagnostic views.
    Both ggplot2 and base-graphics backends.
  contents:
  - plot.bef_fit_re
- title: S3 methods
  desc: >
    Family-agnostic methods on the parent `bef_fit` class
    (`summary`, `print`, `coef`, `vcov`, `confint`,
    `as.data.frame`, `nobs`, `logLik`, `posterior::as_draws`) plus
    `format`/`print`/`summary` on `bef_data` and `bef_diagnostic`.
  contents:
  - bayesEfron-methods
