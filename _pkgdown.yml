home:
  title: "bayesEfron — Fully Bayesian Efron log-spline deconvolution"
  description: |
    A Bayesian R package for univariate random-effects meta-analytic
    deconvolution with heteroscedastic within-study standard errors.
    Given per-site effect estimates and standard errors, `bayesEfron`
    fits the fully Bayesian Efron log-spline prior through CmdStan
    and returns posterior site effects together with a continuous
    estimate of the underlying mixing distribution.

    This research was supported by the Institute of Education
    Sciences, U.S. Department of Education, through Grant
    R305D240078 to the University of Alabama. The opinions expressed
    are those of the authors and do not represent views of the
    Institute or the U.S. Department of Education.

